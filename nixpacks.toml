# TalaqqiHub — Java Maven WAR (Servlet/JSP on Tomcat 9).
# Kerocket production deploy uses Docker (see kerocket.toml + Dockerfile).
# This file satisfies Nixpacks/Maven detection when the platform scans the repo.

[variables]
NIXPACKS_JDK_VERSION = "17"

[phases.setup]
nixPkgs = ["maven"]

[phases.build]
cmds = ["mvn -B -DskipTests package"]

[start]
cmd = "echo 'TalaqqiHub requires Tomcat — deploy with Dockerfile (kerocket.toml builder=docker).' >&2; exit 1"
