# TalaqqiHub — Java Servlet/JSP on Apache Tomcat 9 (NOT Node.js).
#
# BUILD: Docker only (Maven WAR + Tomcat 9). Do not use Nixpacks Node detection.
#
# DEPLOY TAB — required environment variables (copy from .env.example):
#   DB_URL         = jdbc:mysql://HOST:PORT/talaqqihub_db?sslMode=REQUIRED
#   DB_USER        = avnadmin          (Aiven default user)
#   DB_PASSWORD    = <your Aiven password>   ← MUST be set in Deploy tab
#   PORT           = 8080
#   GEMINI_API_KEY = (optional, for AI assistant)
#
# Alternative: attach MySQL data service and set DATABASE_URL instead of DB_USER/DB_PASSWORD.

[project]
name = "TalaqqiHub"
language = "java"
runtime = "tomcat"
stack = "docker"

[build]
builder = "docker"
method = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[runtime]
type = "docker"
port = 8080
start = "/usr/local/bin/docker-entrypoint.sh catalina.sh run"
