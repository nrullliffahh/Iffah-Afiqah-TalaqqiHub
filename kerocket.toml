# TalaqqiHub — Java Servlet/JSP on Apache Tomcat 9 (NOT Node.js).
#
# BUILD: Docker only (Maven WAR + Tomcat 9). Do not use Nixpacks Node detection.
#
# DEPLOY TAB — required environment variables (copy from .env.example):
#   PORT           = 8080
#   DB_URL         = jdbc:mysql://avnadmin:PASSWORD@HOST:16135/talaqqihub_db?sslMode=REQUIRED
#                    (embed Aiven user + password in the URL — Kerocket may not pass DB_USER/DB_PASSWORD)
#
# Alternative: separate lines instead of embedded URL:
#   DB_URL, DB_USER=avnadmin, DB_PASSWORD=<Aiven password>
#
# Or attach MySQL data service and set DATABASE_URL (internal Kerocket MySQL only).

[project]
name = "TalaqqiHub"
language = "java"
runtime = "tomcat"
stack = "docker"

[build]
builder = "docker"
method = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[runtime]
type = "docker"
port = 8080
start = "/usr/local/bin/docker-entrypoint.sh catalina.sh run"
