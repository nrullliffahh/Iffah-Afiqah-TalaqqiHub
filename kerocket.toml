# TalaqqiHub — Java Servlet/JSP on Apache Tomcat 9 (WAR deployment).
#
# BUILD: Docker only. Do not use Nixpacks auto-detect (Servlet WAR needs Tomcat).
#
# Deploy tab — required environment variables (see .env.example):
#   PORT=8080
#   DB_URL=jdbc:mysql://USER:PASSWORD@HOST:PORT/db?sslMode=REQUIRED&serverTimezone=UTC
# Or: DB_URL + DB_USER + DB_PASSWORD

[project]
name = "TalaqqiHub"
language = "java"
runtime = "tomcat"
stack = "docker"

[build]
builder = "docker"
method = "dockerfile"
dockerfile = "Dockerfile"
context = "."

[runtime]
type = "docker"
port = 8080
start = "/usr/local/bin/docker-entrypoint.sh catalina.sh run"

[healthcheck]
path = "/"
port = 8080
interval = 30
timeout = 10
