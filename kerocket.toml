# Kerocket — Java Servlet/JSP on Tomcat (NOT Node.js).
# Build: Dockerfile only. No root package.json — not a Node app.
# Optional Tailwind dev tooling: tools/package.json (CSS pre-built in css/).
#
# Deploy tab env vars:
#   DB_URL, DB_USER, DB_PASSWORD, DATABASE_URL, GEMINI_API_KEY, PORT

[project]
name = "TalaqqiHub"
language = "java"
runtime = "tomcat"

[build]
builder = "docker"
dockerfile = "Dockerfile"

[runtime]
type = "docker"
start = "/usr/local/bin/docker-entrypoint.sh catalina.sh run"
