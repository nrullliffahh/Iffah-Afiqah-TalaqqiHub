# Kerocket — Java Servlet/JSP on Tomcat (NOT Node.js).
# Build: Dockerfile only (Maven WAR + Tomcat 9). Self-contained: Tomcat + app listen on $PORT.
# package.json lives under tools/ for optional Tailwind dev only — not a Node server.
#
# Deploy tab env vars supported by the app:
#   DB_URL, DB_USER, DB_PASSWORD   — preferred for Aiven/MySQL JDBC
#   DATABASE_URL                   — from attached MySQL data service
#   GEMINI_API_KEY                 — AI assistant (GeminiService)
#   PORT                           — HTTP port (Tomcat binds 0.0.0.0:$PORT)

[build]
dockerfile = "Dockerfile"
builder = "docker"

[runtime]
type = "docker"
start = "/usr/local/bin/docker-entrypoint.sh catalina.sh run"
